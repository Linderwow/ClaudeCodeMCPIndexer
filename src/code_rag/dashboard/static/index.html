<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>command center</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo-dot"></span>
        <h1>command center</h1>
        <span class="version" id="version">·</span>
        <!-- Phase 60-A3: live status line so you can see WHY the Start/Stop
             button shows what it shows. Populated by app.js renderStatus(). -->
        <span class="topbar-status" id="topbar-status">—</span>
      </div>
      <div class="topbar-actions">
        <!-- Phase 55: this button controls the CODE-RAG stack (LM Studio
             + watcher + MCP servers), not all 3 projects. YouTubeBot and
             MNQAlpha are managed via Task Scheduler / their own scripts;
             use the per-card buttons below for those.

             Phase 52's budget_guard refuses the action if (current_used
             + code-rag cost) would exceed (total - reserve), so a click
             here can't OOM the GPU even when other projects are heavy. -->
        <button id="btn-toggle-all" class="btn btn-primary" type="button"
                data-action="start" data-target="all"
                title="Start the code-rag stack only (LM Studio + watcher + MCP servers, ~14 GB RAM + 12 GB VRAM). Refused by the budget guard if there isn't enough headroom.">
          <span class="btn-dot"></span> <span class="btn-label">Start code-rag</span>
        </button>
      </div>
    </header>

    <!-- Top-level grid: Resources (RAM/VRAM/GPU) + Indexing (vectors/
         chunks/embedder/auto-stop state) side-by-side. Cross-cutting
         status that applies to the whole stack. -->
    <section class="grid">
      <article class="card" id="card-resources">
        <header class="card-header">
          <h2>Resources</h2>
          <span class="status-pill ok" id="resources-status">live</span>
        </header>
        <div class="card-body">
          <h3 class="subhead">System RAM</h3>
          <div class="bar"><div class="bar-fill" id="ram-bar"></div></div>
          <div class="kv small"><span id="ram-label">—</span><span id="ram-pct">—</span></div>
          <h3 class="subhead">GPU VRAM</h3>
          <div class="bar"><div class="bar-fill gpu" id="gpu-bar"></div></div>
          <div class="kv small"><span id="gpu-label">—</span><span id="gpu-pct">—</span></div>
          <div class="kv small"><span>GPU util / temp</span><span id="gpu-util">—</span></div>
        </div>
      </article>

      <!-- Phase 60-I: Indexing card — always visible, shows the live
           index state (coverage / embedder / state). The transient
           `.reindex` card below this grid handles the live rate/ETA
           during active catch-up; this card is the permanent at-a-
           glance summary. -->
      <article class="card" id="card-index">
        <header class="card-header">
          <h2>Indexing</h2>
          <span class="status-pill" id="index-status">probing…</span>
        </header>
        <div class="card-body">
          <h3 class="subhead">Coverage</h3>
          <div class="bar"><div class="bar-fill" id="index-bar"></div></div>
          <div class="kv small">
            <span id="index-label">— / —</span>
            <span id="index-pct">—</span>
          </div>
          <h3 class="subhead">Embedder</h3>
          <div class="kv small dim">
            <span id="index-embedder-name">—</span>
            <span id="index-embedder-dim">—</span>
          </div>
          <h3 class="subhead">State</h3>
          <div class="kv small dim">
            <span id="index-state-detail">—</span>
            <span id="index-last-activity">—</span>
          </div>
        </div>
      </article>
    </section>

    <!-- Phase 60-A2 + A3: reindex-in-progress indicator. Shown only when
         dense (chroma) vector count lags FTS chunk count by >1%.
         Hides itself in steady state. Live rate + ETA computed from a
         sliding window of poll samples in app.js. -->
    <section class="reindex" id="reindex" style="display: none;">
      <header class="card-header">
        <h2>Reindex in progress</h2>
        <span class="status-pill" id="reindex-status">—</span>
      </header>
      <div class="card-body">
        <div class="bar"><div class="bar-fill" id="reindex-bar"></div></div>
        <div class="kv small">
          <span id="reindex-label">—</span>
          <span id="reindex-pct">—</span>
        </div>
        <div class="kv small">
          <span id="reindex-rate">—</span>
          <span id="reindex-eta">—</span>
        </div>
        <div class="kv small dim">
          <span>via</span>
          <span id="reindex-embedder">—</span>
        </div>
      </div>
    </section>

    <!-- Phase 52: resource budget at a glance — can each project start
         given current free RAM/VRAM? -->
    <section class="budget" id="budget">
      <header class="card-header">
        <h2>Resource Budget</h2>
        <span class="status-pill" id="budget-status">probing…</span>
      </header>
      <div class="budget-rows" id="budget-rows">
        <!-- Rendered dynamically by app.js from /api/budget -->
      </div>
    </section>

    <!-- The main view: every project's tasks + processes in one place. -->
    <section class="projects" id="projects">
      <header class="card-header">
        <h2>All Projects</h2>
        <span class="status-pill" id="projects-status">probing…</span>
      </header>
      <div class="projects-grid" id="projects-grid">
        <!-- Cards populated dynamically by app.js from /api/projects -->
      </div>
    </section>

    <!-- Activity log — feedback for Start/Stop button + any client-side
         warnings (e.g. /api/projects probe failure). -->
    <section class="logpane">
      <header class="card-header">
        <h2>Activity</h2>
        <button id="btn-clear-log" class="btn btn-link" type="button">clear</button>
      </header>
      <div id="log" class="log" aria-live="polite"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
