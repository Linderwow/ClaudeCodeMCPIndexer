# code-rag-mcp example config — COMMITTED to git.
#
# First-time setup on ANY machine:
#   1. cp config.example.toml config.toml
#   2. (optional) edit [paths].roots if you want pre-pinned codebases — the
#      auto-discovery MCP tool (`ensure_workspace_indexed`) already covers
#      any repo Claude Code opens, so leaving roots empty is a valid choice.
#   3. data_dir / log_dir stay relative; they live inside the repo tree and
#      are gitignored (data/ and logs/).
#
# Cross-machine portability:
#   - Use `~/path` or `${USERPROFILE}/path` in roots — these expand at load
#     time so the SAME config.toml works on every machine you sync it to.
#   - Override the active config file via `$CODE_RAG_CONFIG` at runtime.
#   - The real `config.toml` is gitignored so absolute paths never enter
#     git history; if you DO commit a portable config.toml elsewhere, prefer
#     `~/...` over absolute paths.

[paths]
# Roots that get indexed. Absolute paths or `~`-relative.
# Leave empty to rely PURELY on auto-discovery — every repo Claude Code opens
# gets registered via `ensure_workspace_indexed` and persisted in
# data/dynamic_roots.json. Pre-pin here only when you want a specific
# codebase indexed at install time without waiting for Claude to open it.
roots = [
    # Pinned examples (uncomment + edit). `~` expands per-machine.
    # "~/RiderProjects",
    # "~/Documents/NinjaTrader 8/bin/Custom/Strategies",
    # "~/code/some-repo",
]
# Data dir holds Chroma, Kuzu, SQLite-FTS, index metadata. Must be OUTSIDE every root.
data_dir = "./data"
log_dir  = "./logs"

[ignore]
# gitignore-style globs applied on top of any .gitignore found in a root.
globs = [
    # --- VCS / editor / OS noise ---
    "**/.git/**",
    "**/.vs/**",
    "**/.idea/**",
    "**/.vscode/**",

    # --- Python build/dep ---
    "**/__pycache__/**",
    "**/*.pyc",
    "**/.venv/**",
    "**/venv/**",
    "**/*.egg-info/**",

    # --- .NET build outputs ---
    # Keep these SPECIFIC. `**/bin/**` (broader) is dangerous: it also matches
    # paths like `NinjaTrader 8/bin/Custom/Strategies/` where `bin` is a
    # legitimate code-hosting directory, not a build output.
    "**/bin/Debug/**",
    "**/bin/Release/**",
    "**/bin/x64/**",
    "**/bin/x86/**",
    "**/bin/Any CPU/**",
    "**/obj/**",
    "**/TestResults/**",
    "**/packages/**",

    # --- Node / web build outputs ---
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.angular/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
    "**/playwright-report/**",
    "**/test-results/**",

    # --- Minified / sourcemap / lockfiles ---
    "**/*.min.js",
    "**/*.min.css",
    "**/*.map",
    "**/package-lock.json",
    "**/yarn.lock",
    "**/pnpm-lock.yaml",
]

[embedder]
kind      = "lm_studio"
base_url  = "http://localhost:1234/v1"
# LM Studio reports the downloaded model under this id (verify with `lms ls`).
model     = "text-embedding-qwen3-embedding-4b"
# Dimension is probed on first use and stamped into index metadata. Mismatch = refuse to query.
dim       = 0
timeout_s = 60
batch     = 32

[reranker]
# Four reranker backends are supported:
#   "cross_encoder" — Phase 29 sentence-transformers CrossEncoder (e.g.
#                     BAAI/bge-reranker-v2-m3). RECOMMENDED DEFAULT.
#                     Faster, more deterministic, and significantly higher
#                     quality than the chat-based listwise alternative.
#                     Measured uplift on the manual eval fixture vs lm_chat:
#                       Recall@1  62.5% → 67.5%  (+5.0pp)
#                       Recall@3  77.5% → 85.0%  (+7.5pp)
#                       MRR       0.722 → 0.753  (+3.1pp)
#                       p50       1328ms → 343ms (4× faster on GPU)
#                     Requires `pip install -e ".[cross-encoder]"`.
#                     For GPU acceleration on Windows / CUDA:
#                       pip install --force-reinstall --no-deps torch \
#                         --index-url https://download.pytorch.org/whl/cu121
#   "lm_chat"       — Phase 24 listwise reranker via /v1/chat/completions on
#                     a small chat model. Fallback when sentence-transformers
#                     can't be installed.
#   "lm_studio"     — OpenAI-compatible /v1/rerank (Jina-style). LM Studio
#                     itself doesn't implement this; for vLLM / TEI users.
#   "noop"          — explicit no-op, useful for ablation eval and CI.
kind      = "cross_encoder"
base_url  = "http://localhost:1234/v1"   # unused for cross_encoder; kept for interface
model     = "BAAI/bge-reranker-v2-m3"
top_k_in  = 50
top_k_out = 8
timeout_s = 60
# Cross-encoder tuning (only used when kind="cross_encoder").
# device left blank → sentence-transformers auto-picks (CUDA → MPS → CPU).
# device = "cuda"
cross_encoder_max_chars = 600
# Listwise tuning carryover (used only when kind="lm_chat").
chat_max_candidates    = 20
chat_max_chars_per_doc = 300

[vector_store]
kind       = "chroma"
# Collection prefix. The actual Chroma collection name is this + a hash of the
# embedder model/dim, so swapping embedders never pollutes a shared collection.
collection = "code_rag_v1"

[graph_store]
kind = "kuzu"
db   = "graph"       # subdir under data_dir

[lexical_store]
kind = "sqlite_fts5"
db   = "fts.db"      # under data_dir

[chunker]
# AST-aware chunk size guardrails (chars, not tokens — tokens measured post-hoc).
min_chars     = 80
max_chars     = 2400
overlap_chars = 0

[watcher]
debounce_ms = 500

[query_rewriter]
# Phase 30: query expansion at search time.
#
# When `enabled = true`:
#   - Local (free) rewrites ALWAYS run: snake_case ↔ CamelCase ↔ spaced
#     variants for any identifier-shaped tokens in the query. The first
#     variant is added as a parallel search arm (capped to 2 arms total
#     so we don't overload the embedder).
#   - If `model` is set AND loaded in LM Studio, the rewriter ALSO calls
#     the chat model for related-identifier suggestions. Cached on disk
#     for 24 h so repeats are free.
#
# Local-only is the default. Set `model = "qwen/qwen3-1.7b"` to add LLM
# expansions (adds ~1s per first-time query, free on cache hit).
enabled  = true
base_url = ""             # blank = use embedder.base_url
model    = ""             # blank = local-only, no LLM call
timeout_s = 8.0
cache    = true
db       = "rewrite_cache.db"

[mcp]
name = "code-rag"
