# code-rag-mcp example config — COMMITTED to git.
#
# First-time setup on ANY machine:
#   1. cp config.example.toml config.toml
#   2. (optional) edit [paths].roots if you want pre-pinned codebases — the
#      auto-discovery MCP tool (`ensure_workspace_indexed`) already covers
#      any repo Claude Code opens, so leaving roots empty is a valid choice.
#   3. data_dir / log_dir stay relative; they live inside the repo tree and
#      are gitignored (data/ and logs/).
#
# Cross-machine portability:
#   - Use `~/path` or `${USERPROFILE}/path` in roots — these expand at load
#     time so the SAME config.toml works on every machine you sync it to.
#   - Override the active config file via `$CODE_RAG_CONFIG` at runtime.
#   - The real `config.toml` is gitignored so absolute paths never enter
#     git history; if you DO commit a portable config.toml elsewhere, prefer
#     `~/...` over absolute paths.

[paths]
# Roots that get indexed. Absolute paths or `~`-relative.
# Leave empty to rely PURELY on auto-discovery — every repo Claude Code opens
# gets registered via `ensure_workspace_indexed` and persisted in
# data/dynamic_roots.json. Pre-pin here only when you want a specific
# codebase indexed at install time without waiting for Claude to open it.
roots = [
    # Pinned examples (uncomment + edit). `~` expands per-machine.
    # "~/RiderProjects",
    # "~/Documents/NinjaTrader 8/bin/Custom/Strategies",
    # "~/code/some-repo",
]
# Data dir holds Chroma, Kuzu, SQLite-FTS, index metadata. Must be OUTSIDE every root.
data_dir = "./data"
log_dir  = "./logs"

[ignore]
# gitignore-style globs applied on top of any .gitignore found in a root.
globs = [
    # --- VCS / editor / OS noise ---
    "**/.git/**",
    "**/.vs/**",
    "**/.idea/**",
    "**/.vscode/**",

    # --- Python build/dep ---
    "**/__pycache__/**",
    "**/*.pyc",
    "**/.venv/**",
    "**/venv/**",
    "**/*.egg-info/**",

    # --- .NET build outputs ---
    # Keep these SPECIFIC. `**/bin/**` (broader) is dangerous: it also matches
    # paths like `NinjaTrader 8/bin/Custom/Strategies/` where `bin` is a
    # legitimate code-hosting directory, not a build output.
    "**/bin/Debug/**",
    "**/bin/Release/**",
    "**/bin/x64/**",
    "**/bin/x86/**",
    "**/bin/Any CPU/**",
    "**/obj/**",
    "**/TestResults/**",
    "**/packages/**",

    # --- Node / web build outputs ---
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.angular/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
    "**/playwright-report/**",
    "**/test-results/**",

    # --- E2E test build artifacts (Phase 35: caught wedging the indexer) ---
    # bin/build_check/.playwright bundles minified JS into thousands of
    # tiny chunks. The chunker can't break minified code into anything
    # meaningful and ends up indexing each bundle as ~500-2000 chunks of
    # gibberish, wedging the indexer for hours while consuming GPU.
    "**/bin/build_check/**",
    "**/.playwright/**",
    "**/build_check/**",          # generic case (some setups put this elsewhere)

    # --- Minified / sourcemap / lockfiles ---
    "**/*.min.js",
    "**/*.min.css",
    "**/*.map",
    "**/*.bundle.js",             # webpack-style bundles (also chunker-hostile)
    "**/*.chunk.js",              # code-split chunks (same)
    "**/package-lock.json",
    "**/yarn.lock",
    "**/pnpm-lock.yaml",

    # --- Transient atomic-write artifacts (Phase 36-H) ---
    # Tools that atomically write files (editor saves, telemetry
    # writers, etc.) create + rename + delete .tmp / .swap files. The
    # watcher used to fire a delete-event for each one, hammering Kuzu
    # with lock conflicts. These are never useful to index.
    "**/*.tmp",
    "**/*.swp",                   # vim swap files
    "**/*.swo",
    "**/*~",                      # editor backup files
    "**/.#*",                     # emacs lockfiles
]

[embedder]
# Two embedder backends are supported:
#   "lm_studio"             : OpenAI-compatible /v1/embeddings on LM Studio.
#                              GGUF-only — most code-specialized embedders
#                              (bge-code-v1, codesage, nomic-embed-code) have
#                              no GGUF release and can't use this backend.
#                              Use this when running a Qwen3-Embedding GGUF.
#   "sentence_transformers" : Phase 34. Direct sentence-transformers backend.
#                              Loads any HuggingFace embedder (SafeTensors or
#                              GGUF). GPU when CUDA torch is installed (see
#                              the cross-encoder install instructions). Best
#                              Recall@10 on code-search benchmarks because
#                              you can use the actual code-specialized models.
#                              RECOMMENDED for code-search workloads.
kind      = "sentence_transformers"
base_url  = ""                    # unused for sentence_transformers
model     = "BAAI/bge-code-v1"    # ~1.3 GB, dim=1536, top-3 MTEB Code
dim       = 0                     # probed on first use, stamped into index meta
timeout_s = 60
batch     = 64                    # sentence-transformers batches GPU-resident
# sentence_transformers-only knobs:
device    = "cuda"                # leave blank to auto-pick (cuda > mps > cpu)
normalize = true                  # bge family is trained for L2-normalized
trust_remote_code = false         # only needed for some custom embedders
# Phase 19: chat model for HyDE hypothetical-document expansion. Comment out
# to disable. The Phase 19 intent classifier gates HyDE so it ONLY fires on
# natural-language / mixed queries — bare identifier lookups never spend an
# LLM call. With a 1.7B model HyDE regressed quality (-0.5pp R@3 because the
# small model wrote weak hypotheticals); a 7B coder writes realistic enough
# hypothetical code to be neutral-to-positive. Recommended:
hyde_model = "qwen2.5-coder-7b-instruct"

[reranker]
# Four reranker backends are supported:
#   "cross_encoder" — Phase 29 sentence-transformers CrossEncoder (e.g.
#                     BAAI/bge-reranker-v2-m3). RECOMMENDED DEFAULT.
#                     Faster, more deterministic, and significantly higher
#                     quality than the chat-based listwise alternative.
#                     Measured uplift on the manual eval fixture vs lm_chat:
#                       Recall@1  62.5% → 67.5%  (+5.0pp)
#                       Recall@3  77.5% → 85.0%  (+7.5pp)
#                       MRR       0.722 → 0.753  (+3.1pp)
#                       p50       1328ms → 343ms (4× faster on GPU)
#                     Requires `pip install -e ".[cross-encoder]"`.
#                     For GPU acceleration on Windows / CUDA:
#                       pip install --force-reinstall --no-deps torch \
#                         --index-url https://download.pytorch.org/whl/cu121
#   "lm_chat"       — Phase 24 listwise reranker via /v1/chat/completions on
#                     a small chat model. Fallback when sentence-transformers
#                     can't be installed.
#   "lm_studio"     — OpenAI-compatible /v1/rerank (Jina-style). LM Studio
#                     itself doesn't implement this; for vLLM / TEI users.
#   "noop"          — explicit no-op, useful for ablation eval and CI.
kind      = "cross_encoder"
base_url  = "http://localhost:1234/v1"   # unused for cross_encoder; kept for interface
model     = "BAAI/bge-reranker-v2-m3"
top_k_in  = 50
top_k_out = 8
timeout_s = 60
# Cross-encoder tuning (only used when kind="cross_encoder").
# device left blank → sentence-transformers auto-picks (CUDA → MPS → CPU).
# device = "cuda"
cross_encoder_max_chars = 600
# Listwise tuning carryover (used only when kind="lm_chat").
chat_max_candidates    = 20
chat_max_chars_per_doc = 300

[vector_store]
kind       = "chroma"
# Collection prefix. The actual Chroma collection name is this + a hash of the
# embedder model/dim, so swapping embedders never pollutes a shared collection.
collection = "code_rag_v1"

[graph_store]
kind = "kuzu"
db   = "graph"       # subdir under data_dir

[lexical_store]
kind = "sqlite_fts5"
db   = "fts.db"      # under data_dir

[chunker]
# AST-aware chunk size guardrails (chars, not tokens — tokens measured post-hoc).
min_chars     = 80
max_chars     = 2400
overlap_chars = 0

[watcher]
debounce_ms = 500

[query_rewriter]
# Phase 30: query expansion at search time.
#
# When `enabled = true`:
#   - Local (free) rewrites ALWAYS run: snake_case ↔ CamelCase ↔ spaced
#     variants for any identifier-shaped tokens in the query. The first
#     variant is added as a parallel search arm (capped to 2 arms total
#     so we don't overload the embedder).
#   - If `model` is set AND loaded in LM Studio, the rewriter ALSO calls
#     the chat model for related-identifier suggestions. Cached on disk
#     for 24 h so repeats are free.
#
# Local-only is the default. Set `model = "qwen/qwen3-1.7b"` to add LLM
# expansions (adds ~1s per first-time query, free on cache hit).
enabled  = true
base_url = ""             # blank = use embedder.base_url
model    = ""             # blank = local-only, no LLM call
timeout_s = 8.0
cache    = true
db       = "rewrite_cache.db"

[decompose]
# Phase 37-A: query decomposition. Splits a multi-part question into
# 2-3 sub-queries that each become an extra retrieval arm. Disabled by
# default; enable + set `model` to a loaded chat model to opt in.
enabled  = false
base_url = ""                       # blank = use embedder.base_url
model    = ""                       # blank = disabled
timeout_s = 8.0

[reflection]
# Phase 37-B: post-rerank reflection. LLM scores how directly each top-K
# candidate answers the question; blended with the cross-encoder score.
# Confidence-gated, so confident queries pay no LLM cost. Disabled by
# default.
enabled            = false
base_url           = ""
model              = ""
timeout_s          = 15.0
blend_alpha        = 0.6
skip_if_top1_above = 0.7
top_k              = 8

[telemetry]
# Phase 37-C: continuous retrieval telemetry. When enabled, every
# eval-gate invocation appends one row to data/eval/history.jsonl. The
# dashboard plots the trend so quality drift is visible over weeks.
enabled = true

[indexer]
# Phase 15: parallel-pipeline tuning. parallel_workers files-in-flight at
# the chunk+embed stage; store writes are serialized via a single async
# lock to keep Chroma/Kuzu/FTS upserts ordered.
parallel_workers  = 4
embed_concurrency = 4

[lm_janitor]
# Phase 37-F: auto-unload `<model>:N` duplicate LM Studio aliases that
# appear when `lms load` is called twice with different settings while
# the model is already loaded. Each duplicate burns the full model size
# in VRAM (~2.5 GB for qwen3-embedding-4B). Loop runs inside the
# autostart watcher process; safe to leave on.
enabled    = true
interval_s = 60.0

[mcp]
name = "code-rag"
